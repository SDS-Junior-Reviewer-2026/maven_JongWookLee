name: Java CI with Maven and Email Notification

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # 수동 실행 기능도 유지합니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 설정 (Maven 빌드용)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven 빌드 및 패키징
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # 4. AWS CLI 자격 증명 설정 (빌드 성공 후 실행)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 5. 빌드 완료 이메일 전송
      - name: Send Email with SES
        run: |
          aws ses send-email \
            --from "bull1997@naver.com" \
            --destination "ToAddresses=bull1997@naver.com.com" \
            --message "Subject={Data=Maven 빌드 완료 보고},Body={Text={Data=GitHub Actions를 통한 Maven 빌드가 성공적으로 완료되었습니다!}}"